name: TaskFlow CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend:
        runs-on: ubuntu-latest

        defaults:
          run:
            working-directory: backend

        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/taskflow_db
          JWT_SECRET: github-actions-test-secret
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          FRONTEND_URL: http://localhost:3000

        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Set up Node.js
            uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: npm
              cache-dependency-path: backend/package-lock.json

          - name: Install backend dependencies
            run: npm ci

          - name: Create backend environment file
            run: |
              echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5433/taskflow_db" > .env
              echo "JWT_SECRET=github-actions-test-secret" >> .env
              echo "JWT_EXPIRES_IN=7d" >> .env
              echo "NODE_ENV=test" >> .env
              echo "FRONTEND_URL=http://localhost:3000" >> .env

          - name: Generate Prisma client
            run: npx prisma generate

          - name: Build backend
            run: npm run build
            
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api